global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.techstream.io:587"
  smtp_from: "alerts@techstream.io"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "job", "signal"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-webhook"
      continue: true

    - match:
        severity: critical
        signal: errors
      receiver: "auto-remediation"
      group_wait: 10s
      continue: false

    - match:
        severity: warning
      receiver: "warning-email"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://remediation-service:8080/webhook"
        send_resolved: true

  - name: "critical-webhook"
    webhook_configs:
      - url: "http://remediation-service:8080/webhook"
        send_resolved: true
        http_config:
          bearer_token: "${WEBHOOK_TOKEN}"

  - name: "auto-remediation"
    webhook_configs:
      - url: "http://remediation-service:8080/remediate"
        send_resolved: true
        max_alerts: 5

  - name: "warning-email"
    email_configs:
      - to: "platform-team@techstream.io"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "job"]
