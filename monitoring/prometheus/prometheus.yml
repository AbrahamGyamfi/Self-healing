global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "techstream-prod"
    cluster: "self-healing-demo"

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "techstream_api"
    static_configs:
      - targets: ["techstream-app:5000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
