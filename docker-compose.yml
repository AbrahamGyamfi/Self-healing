version: "3.9"

networks:
  techstream:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  techstream-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: techstream-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
    networks:
      - techstream
    labels:
      - "com.techstream.role=application"

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - techstream
    depends_on:
      - techstream-app

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    environment:
      WEBHOOK_TOKEN: "${WEBHOOK_TOKEN:-changeme}"
    networks:
      - techstream

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-techstream123}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/golden_signals.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - techstream
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Node Exporter  (host metrics)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - techstream

  # ---------------------------------------------------------------------------
  # cAdvisor  (container metrics)
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - techstream

  # ---------------------------------------------------------------------------
  # Remediation Service
  # ---------------------------------------------------------------------------
  remediation-service:
    build:
      context: ./remediation
      dockerfile: Dockerfile
    container_name: remediation-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      WEBHOOK_TOKEN: "${WEBHOOK_TOKEN:-changeme}"
      APP_CONTAINER: "techstream-app"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - techstream
    depends_on:
      - techstream-app
