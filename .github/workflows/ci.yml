name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.9

      - name: Lint app/
        run: ruff check app/ chaos/ remediation/ ai_analysis/ --ignore E501

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r tests/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_integration.py \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image (techstream-app)
        run: docker build -t techstream-app:ci ./app

      - name: Build remediation image (remediation-service)
        run: docker build -t techstream-remediation:ci ./remediation

      - name: Verify all compose service images are pullable
        run: |
          docker pull prom/prometheus:v2.52.0
          docker pull prom/alertmanager:v0.27.0
          docker pull grafana/grafana:10.4.2
          docker pull prom/node-exporter:v1.8.0
          docker pull gcr.io/cadvisor/cadvisor:v0.49.1
          echo "All 7 service images verified"

  deploy:
    name: Deploy to AWS via SSM
    runs-on: ubuntu-latest
    needs: [test, terraform-validate, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get instance ID from ASG
        id: instance
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names techstream-asg \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | awk '{print $1}')
          if [ -z "$INSTANCE_ID" ]; then
            echo "No in-service instance found in techstream-asg"
            exit 1
          fi
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Deploying to $INSTANCE_ID"

      - name: Pull latest code and restart all containers
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx",
              "chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx",
              "cd /opt/techstream",
              "git pull origin main",
              "docker compose pull --quiet 2>/dev/null || true",
              "docker compose up -d --build --remove-orphans",
              "echo --- container status ---",
              "docker compose ps"
            ]' \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command ID: $CMD_ID"

      - name: Wait for SSM command to finish
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}"

      - name: Show deploy output and verify success
        run: |
          RESULT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.cmd_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query '{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}' \
            --output json)
          echo "=== SSM Output ==="
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Output'])"
          echo "=== SSM Errors ==="
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Error'])"
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['Status'])")
          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Smoke test — all Golden Signal endpoints
        run: |
          ALB="http://techstream-alb-919462331.eu-west-1.elb.amazonaws.com"
          echo "Waiting 20s for containers to stabilise..."
          sleep 20
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ALB/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              curl -s "$ALB/health" | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s"
            sleep 15
          done
          echo "Health check failed after all retries"
          exit 1
